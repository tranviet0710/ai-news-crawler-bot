name: AI News Crawler Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-api:
    runs-on: ubuntu-latest
    steps:
      - name: Call FastAPI endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          curl --fail-with-body -X POST "$API_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
            # The API_URL is typically the public endpoint of your deployed FastAPI application.
            # If you deployed your FastAPI app to GitHub Actions, you need to set the API_URL as a secret in your repository settings.
            # For example, if your FastAPI app is hosted at https://ai-news-crawler-bot.onrender.com/api/cron, then API_URL should be:
            # https://ai-news-crawler-bot.onrender.com/api/cron
            # Replace this with your actual deployed endpoint.